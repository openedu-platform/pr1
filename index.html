  // Funkcija koja pronalazi najbolji glas za izabrani jezik za čitanje teksta (OS i TTS) 
  function getVoiceForLanguage(lang) {
      const voices = window.speechSynthesis.getVoices();
      // Prvo pokušaj tačno podudaranje
      let voice = voices.find(v => v.lang.toLowerCase() === lang.toLowerCase());
      if (!voice) {
          // Ako nema, pokušaj pronaći glas sa istim jezikom (bez regije)
          const shortLang = lang.split("-")[0];
          voice = voices.find(v => v.lang.toLowerCase().startsWith(shortLang));
      }
      if (!voice) {
          // Ako ni to ne postoji, uzmi prvi dostupni
          voice = voices[0];
      }
      return voice;
  }

  // TTS funkcija za pretvaranje teksta u govor, računar izgovara (tekst ovde ne sme biti multilingual) 
  // Sa Web Speech API-jem → mora jedan jezik po sesiji. Mešanje unutar iste rečenice retko uspeva.

    function cirilicaUlatinicu(textIzCirLat) {
      const map = {
        'А': 'A', 'Б': 'B', 'В': 'V', 'Г': 'G', 'Д': 'D',
        'Ђ': 'Đ', 'Е': 'E', 'Ж': 'Ž', 'З': 'Z', 'И': 'I',
        'Ј': 'J', 'К': 'K', 'Л': 'L', 'Љ': 'Lj', 'М': 'M',
        'Н': 'N', 'Њ': 'Nj', 'О': 'O', 'П': 'P', 'Р': 'R',
        'С': 'S', 'Т': 'T', 'Ћ': 'Ć', 'У': 'U', 'Ф': 'F',
        'Х': 'H', 'Ц': 'C', 'Ч': 'Č', 'Џ': 'Dž', 'Ш': 'Š',
        'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd',
        'ђ': 'đ', 'е': 'e', 'ж': 'ž', 'з': 'z', 'и': 'i',
        'ј': 'j', 'к': 'k', 'л': 'l', 'љ': 'lj', 'м': 'm',
        'н': 'n', 'њ': 'nj', 'о': 'o', 'п': 'p', 'р': 'r',
        'с': 's', 'т': 't', 'ћ': 'ć', 'у': 'u', 'ф': 'f',
        'х': 'h', 'ц': 'c', 'ч': 'č', 'џ': 'dž', 'ш': 'š',
      };
      return textIzCirLat.split('').map(char => map[char] || char).join('');
    }

  function speakCurrent() {
      if (!('speechSynthesis' in window)) {
        alert("Nažalost, vaš browser ne podržava čitanje teksta naglas (TTS).");
        talkText.style.display = 'block';//nema citanja pa treba da se ne vidi Talk dugme
        return;
      }
      flagTalking = true;
      updateIndicator();
      talkText.style.display = 'none';
      tekstZaCitanje = tekstZaCitanje.replaceAll("<br>"," ");  //menja sva pojavljivanja <br> sa " ", da ne bi čitao br kao broj ili brejk
      tekstZaCitanje = tekstZaCitanje.replaceAll("__"," ");  //menja sva pojavljivanja "__" sa " ", koristi se _____ za dopuniti rečenicu, ali automatski čita sve
      const msg = new SpeechSynthesisUtterance(tekstZaCitanje);
      //msg = msg.replaceAll("<br>","");  //menja sva pojavljivanja <br> sa "", tj. briše sve <br>
   
      // Podešavanje jezika i glas
      let langCode = trenutniJezik;
  
      // fallback
      if (trenutniJezik === "sr") langCode = "hr-HR"; // Srpski -> Hrvatski, za sada, dok ne dobijemo dobru podršku za jezik
      if (trenutniJezik === "sl") langCode = "hr-HR"; // Slovenački -> Hrvatski, za sada, dok ne dobijemo dobru podršku za jezik
      //if (trenutniJezik === "sr" && !getVoiceForLanguage("sr")) langCode = "hr-HR";
      //if (trenutniJezik === "sl" && !getVoiceForLanguage("sl-SI")) langCode = "hr-HR";
  
      // Ostali jezici ostaju isti  
      msg.lang = langCode;
  
      // Odaberi odgovarajući glas
      const voice = getVoiceForLanguage(langCode);
      if (voice) msg.voice = voice;
          
      msg.onstart = () => {
        talkText.style.display = 'none';
        pauseTalkBtn.style.display = 'block'; //dok traje TTS citanje ima potrebe da se vide btns pauza i stop za citanje
        stopTalkBtn.style.display = 'block';
        speedTalkControl.style.display = 'block';
        status.textContent = "Čitam...";
      };
              
      msg.onend = () => {
        // kratka pauza da TTS završi i da se ne preklapa sa ASR
        setTimeout(() => {
          updateIndicator();
          status.textContent = "Slušam... Recite...";
          //output2.textContent = "Počeo sam da slušam...";
          pauseTalkBtn.style.display = 'none'; //kada zavrsi TTS citanje nema potrebe da se vide btns pauza i stop za citanje
          stopTalkBtn.style.display = 'none';
          speedTalkControl.style.display = 'none';
          talkText.style.display = 'block';//zavrsilo se TTS-citanje, pa prikayujemo Talk dugme
          output2.textContent = "Završio sam sa čitanjem... Slušam, recite...";
          flagTalking = false;
        }, 400);
      };

      msg.rate = parseFloat(speedTalkControl.value); // defaul-selected 0.9 za speedTalkControl) VAŽNO! (ideja: ASR "uspori", "ubrzaj" sporije, brže - vidi chatGPT rešenje
      window.speechSynthesis.speak(msg);
  }

  function showMessage(tekstPoruke, color, iconKey) {   // funkcija za prikaz jedne poruke (šaljemo joj tekst, boju i ikonu)
    return new Promise(resolve => {

      // Kreiraj ili pronađi overlay sloj
      let overlay = document.getElementById("overlay-blocker");
      // Prikaži overlay da blokira sve klikove i tastaturu
      overlay.style.display = "block"; // aktiviramo prikaz overlay sloja, tada je sve ispod neaktivno na klik mišem, i tastatura... ništa ne reaguje.

      const divElementPoruke = document.createElement("div");
      divElementPoruke.className = `message ${color}`;
      divElementPoruke.innerHTML = `<span class='icon'>${icons[iconKey]}</span> ${tekstPoruke}`;
      messageContainer.appendChild(divElementPoruke);

      // Fade-in
      setTimeout(() => divElementPoruke.classList.add("show"), 100);

      if (aktivanASR) { // ako je ASR aktiviran onda ce procitati motivacionu poruku
        tekstZaCitanje = tekstPoruke;
        speakCurrent();
      }

      // Fade-out posle 9s (2 + 7) - skratio sam
      setTimeout(() => divElementPoruke.classList.remove("show"), 5000);

      // Ukloni element posle 11s (2 fade-in + 7 + 2 fade-out) - skratio sam
      setTimeout(() => {
        divElementPoruke.remove();
        overlay.style.display = "none"; // ponovo dozvoli interakciju
        resolve(); // obavesti da je završeno
      }, 7000);
    });
  }

    function uspori() {
        // Ako bi nova umanjena vrednost pala ispod minimuma, tada ne menjati
      if (((parseFloat(speedTalkControl.value) - 0.3).toFixed(1)) < 0.3) {
        alert("Ne može sporije!");
        return;
      } else {
        // Postavi tačnu string vrednost
        speedTalkControl.value = (parseFloat(speedTalkControl.value) - 0.3).toFixed(1);;
        speedTalkControl.onchange();
      }
    }

    function ubrzaj() {
         //.toFixed(1) zaokruzi na 1 dec. mesto i napravi npr. "1.2" kao string
        // Ako bi nova uvecana vrednost bila iznad maximuma, tada ne menjati
      if (((parseFloat(speedTalkControl.value) + 0.3).toFixed(1)) > "2.1") {
        alert("Ne može brže!");
        return;
      } else {
        // Postavi tačnu string vrednost
        speedTalkControl.value = (parseFloat(speedTalkControl.value) + 0.3).toFixed(1);
        speedTalkControl.onchange();
      }
    }
      
    recognition.onresult = (event) => {
     let transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
     if (transcript.includes("stop") || transcript.includes("stani")) {
       stopTalkBtn.onclick();
       return; 
     }
     if (transcript.includes("pauz") || transcript.includes("nastav")) {
       pauseTalkBtn.onclick();
       return; 
     }
     if (transcript.includes("spori") || transcript.includes("lagan")) {
       uspori();
       return; 
     }
     if (transcript.includes("brz") || transcript.includes("brž")) {
       ubrzaj();
       return; 
     }

     if (flagTalking) {
        recognition.interimResults = true;
        status.textContent = "Čitanje je u toku...";
        output2.textContent = "čujem... " + transcript;
     } else {

      recognition.interimResults = true;
      status.textContent = "flagTalking je false, interimResults je true";
 
      output2.textContent = "Čuo sam: " + transcript;
      //status.textContent = "Ušao sam u recognition.onresult = (event) => ....";

      if (transcript.includes("dalje") || transcript.includes("kviz") || transcript.includes("sledeć")) {
           if (boolTeorijskiDeo) {
             prikaziSledecuTeoriju();
           } else {
             idiNaSledecePitanje();
           }
      } else if (transcript.includes("ponov") || transcript.includes("čita") || transcript.includes("čuo")) {
        speakCurrent();
      } else if (transcript.includes("1") || transcript.includes("prv") || transcript.includes("jedan") || transcript.includes("2") ||  transcript.includes("drug") || transcript.includes("dva") || transcript.includes("3") || transcript.includes("tre") || transcript.includes("tri") || transcript.includes("4") || transcript.includes("etvrt") || transcript.includes("etiri")) {    //bilo: if (transcript.includes("odgovor")) {    izbacio sam da ne mora da kaze rec odgovor, da olaksam
        let answer = "0";
        if (!boolTeorijskiDeo) {
          if (transcript.includes("prv") || transcript.includes("jedan") || transcript.includes("1")) answer = "1";
          if (transcript.includes("drug") || transcript.includes("dva") || transcript.includes("2")) answer = "2";
          if (transcript.includes("tre") || transcript.includes("tri") || transcript.includes("3")) answer = "3";
          if (transcript.includes("etvr") || transcript.includes("etir") || transcript.includes("etri") || transcript.includes("4")) answer = "4";
        }
        //selectedP.textContent = answer ? "✅ Izabrali ste opciju " + answer : "❌ Nije prepoznat odgovor.";
        let intIzabraniOdgovor = parseInt(answer, 10); //ceo broj, osnova 10
        if (intIzabraniOdgovor > 0) proveriOdgovor(--intIzabraniOdgovor); //prvo umanjujem za jedan, jer korisnik posmatra odgovore: prvo, drugo... ili 1,2,3... ali ne od nule
      } else if (transcript.includes("isklju") || transcript.includes("ćuti") || transcript.includes("nemoj") || transcript.includes("neću")) {
         micBtn.onclick(); 
      } else {
        status.textContent = "Nisam razumeo. Pokušaj ponovo.";
      }
     } //glavni if else
     status.textContent = status.textContent + " " + (NoProlaza++);
    }; // kraj za recognition
